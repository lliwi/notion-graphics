services:
  postgres:
    image: postgres:16-alpine
    container_name: notion_charts_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-charts}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-charts}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - back-lan

  redis:
    image: redis:7-alpine
    container_name: notion_charts_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    profiles:
      - with-redis
    networks:
      - back-lan

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: notion_charts_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-charts}?sslmode=disable
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - back-lan

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_EMBED_BASE_URL: ${NEXT_PUBLIC_EMBED_BASE_URL}
    container_name: notion_charts_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_INTERNAL_API_URL: http://backend:3000
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      - backend
    networks:
      back-lan: {}
      int-lan:
        ipv4_address: 192.168.0.30

networks:
  back-lan:
  int-lan:
    external: true

volumes:
  postgres_data:
