services:
  postgres:
    image: postgres:16-alpine
    container_name: notion_charts_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-charts}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-charts}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: notion_charts_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    profiles:
      - with-redis

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: notion_charts_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-charts}
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: ['sh', '-c', 'npm run migration:run && npm run start:dev']

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: notion_charts_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_INTERNAL_API_URL: http://backend:3000
      PORT: 3001
    ports:
      - '3001:3001'
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
